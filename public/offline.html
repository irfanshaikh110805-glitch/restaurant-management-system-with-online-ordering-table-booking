<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Hotel Everest Family Restaurant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .offline-container {
      text-align: center;
      max-width: 500px;
    }

    .offline-icon {
      font-size: 5rem;
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #d97706;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #d1d5db;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.875rem 1.75rem;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
      color: white;
      text-decoration: none;
      border-radius: 0.75rem;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .tips {
      margin-top: 3rem;
      padding: 1.5rem;
      background: rgba(55, 65, 81, 0.5);
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tips h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #f9fafb;
    }

    .tips ul {
      text-align: left;
      list-style: none;
    }

    .tips li {
      padding: 0.5rem 0;
      color: #d1d5db;
    }

    .tips li::before {
      content: "✓ ";
      color: #10b981;
      font-weight: bold;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. Don't worry, you can still browse cached pages!
    </p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      Try Again
    </a>

    <div class="tips">
      <h2>While You're Offline:</h2>
      <ul>
        <li>Check your internet connection</li>
        <li>Browse previously visited pages</li>
        <li>Your cart items are saved</li>
        <li>Orders will sync when you're back online</li>
      </ul>
    </div>
  </div>
</body>
</html>
