    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://eipmrswzotmyxoqqknqg.supabase.co" crossorigin />

    <!-- Resource hints for performance -->
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Remove Google Tag Manager for performance - add only if needed -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_ID"></script> -->

    <!-- Critical CSS inline - optimized and minimal -->
    <style>
      /* Critical CSS for instant render */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          sans-serif;
        background: #111827;
        color: #f9fafb;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .loading-spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
      }
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: 0;
        background: none;
      }
      /* Prevent layout shift */
      .hero {
        min-height: 60vh;
        position: relative;
        background: #111827;
      }
      .navbar {
        height: 80px;
        background: rgba(17, 24, 39, 0.95);
      }
      /* Skeleton loader */
      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(55, 65, 81, 0.5) 25%,
          rgba(75, 85, 99, 0.5) 50%,
          rgba(55, 65, 81, 0.5) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      /* Prevent CLS */
      .hero-title {
        min-height: 120px;
      }
      .section {
        padding: 4rem 0;
      }
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 2rem;
      }
    </style>

    <!-- Optimized font loading - only essential weights with font-display swap -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

        "servesCuisine": "Indian",
        "priceRange": "₹₹",
        "telephone": "+91 98765 43210",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "MG Road",
          "addressLocality": "Vijayapura",
          "addressRegion": "Karnataka",
          "postalCode": "586101",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 16.8251,
          "longitude": 75.71
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "11:00",
            "closes": "23:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Saturday", "Sunday"],
            "opens": "10:00",
            "closes": "23:59"
          }
        ],
        "acceptsReservations": true,
        "url": "https://hoteleverestfamilyrestaurant.example.com"
      }
    </script>
    <title>Hotel Everest Family Restaurant — Authentic Indian Restaurant</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Razorpay Checkout SDK - Load on demand -->
    <script>
      // Load Razorpay only when needed
      window.loadRazorpay = function () {
        return new Promise((resolve, reject) => {
          if (window.Razorpay) {
            resolve(window.Razorpay)
            return
          }
          const script = document.createElement('script')
          script.src = 'https://checkout.razorpay.com/v1/checkout.js'
          script.async = true
          script.onload = () => resolve(window.Razorpay)
          script.onerror = reject
          document.head.appendChild(script)
        })
      }
    </script>
  </body>
</html>
